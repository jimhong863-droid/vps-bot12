name: ⚡ FAST VPS
on: { workflow_dispatch: {} }
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Set root password
        run: echo "root:Yanzz123" | sudo chpasswd

      - name: Install tmate (cepet)
        run: sudo DEBIAN_FRONTEND=noninteractive apt install -y --no-install-recommends tmate

      - name: Install panel + tunnel di background
        run: |
          nohup bash -c '
            curl -sSL https://resource.1panel.hk/quick_start.sh | sudo bash -s -- --yes
            sudo 1pctl update username admin
            sudo 1pctl update password Yanzz123 || sudo 1pctl reset password Yanzz123
            curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /tmp/cf
            chmod +x /tmp/cf && sudo mv /tmp/cf /usr/local/bin/cloudflared
            nohup cloudflared tunnel --url http://localhost:8090 > /tmp/tunnel.log 2>&1 &
          ' > /tmp/bg.log 2>&1 &
          disown
          echo "✅ ROOT: root / Yanzz123"
          echo "PANEL_USER=admin"
          echo "PANEL_PASS=Yanzz123"

      - name: SSH tmate (langsung)
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: false

      - run: while true; do sleep 300; done
