name: Free VPS (Runner 2vCPU 7GB)

on:
  workflow_dispatch:
    inputs:
      duration_minutes:
        description: "Berapa menit VPS hidup (max 350 = ~5 jam 50 menit)"
        required: true
        default: "300"
      install_docker:
        description: "Install Docker?"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  vps:
    name: Free VPS (Nginx + SSH via tmate)
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: Info spek runner
        run: |
          echo "==> CPU"
          nproc
          lscpu | grep -E 'Model name|CPU\(s\)' | head
          echo "==> RAM"
          free -h
          echo "==> Disk"
          df -h /

      - name: Install Nginx
        run: |
          sudo apt-get update -y
          sudo apt-get install -y nginx
          sudo tee /var/www/html/index.html >/dev/null <<'HTML'
          <!doctype html>
          <html lang="id">
          <head><meta charset="utf-8"><title>Free VPS</title></head>
          <body style="font-family:sans-serif;max-width:640px;margin:4rem auto;padding:0 1rem">
            <h1>Nginx aktif di runner GitHub Actions</h1>
            <p>2 vCPU · 7 GB RAM · gratis.</p>
          </body></html>
          HTML
          sudo systemctl enable --now nginx
          sudo systemctl status nginx --no-pager | head -5
          curl -sI http://localhost | head -3

      - name: Verifikasi Docker (sudah preinstalled di runner)
        if: ${{ github.event.inputs.install_docker == 'true' }}
        run: |
          if command -v docker >/dev/null 2>&1; then
            echo "Docker sudah terpasang di runner."
            docker --version
            sudo systemctl start docker 2>/dev/null || sudo service docker start || true
            sudo docker info | head -10 || true
          else
            echo "Docker tidak ditemukan, install via repo resmi..."
            sudo install -m 0755 -d /etc/apt/keyrings
            curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
            sudo chmod a+r /etc/apt/keyrings/docker.gpg
            . /etc/os-release
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/${ID} ${VERSION_CODENAME} stable" \
              | sudo tee /etc/apt/sources.list.d/docker.list >/dev/null
            sudo apt-get update -y
            sudo apt-get install -y docker-ce docker-ce-cli docker-buildx-plugin docker-compose-plugin
            sudo systemctl enable --now docker
            docker --version
          fi

      - name: Expose Nginx ke internet (cloudflared tunnel)
        run: |
          curl -L --output cloudflared.deb \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          nohup cloudflared tunnel --url http://localhost:80 \
            --no-autoupdate > /tmp/cloudflared.log 2>&1 &
          sleep 8
          echo "==> URL publik Nginx (dari log cloudflared):"
          grep -Eo 'https://[a-z0-9-]+\.trycloudflare\.com' /tmp/cloudflared.log | head -1 || cat /tmp/cloudflared.log

      - name: Buka SSH session via tmate (akses dari Termux)
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: false
          detached: true

      - name: Tahan VPS tetap hidup
        run: |
          MIN="${{ github.event.inputs.duration_minutes }}"
          if [ "$MIN" -gt 350 ]; then MIN=350; fi
          echo "VPS akan hidup $MIN menit."
          echo ""
          echo "==> Cara konek dari Termux:"
          echo "1. Scroll log step 'tmate' di atas — cari baris:"
          echo "   SSH: ssh xxxxxxxx@nyc1.tmate.io"
          echo "2. Di Termux jalanin: pkg install openssh -y"
          echo "3. Lalu paste perintah ssh-nya."
          echo ""
          for i in $(seq 1 "$MIN"); do
            sleep 60
            echo "[$i/$MIN menit] VPS masih hidup — $(date -u +%H:%M:%S)"
          done

      - name: Summary
        if: always()
        run: |
          {
            echo "## Free VPS selesai"
            echo ""
            echo "- Spek: 2 vCPU, 7 GB RAM, 14 GB SSD"
            echo "- Nginx: aktif di port 80"
            echo "- Akses SSH: lihat log step *tmate* di run ini"
            echo "- URL publik Nginx: lihat log step *cloudflared*"
          } >> "$GITHUB_STEP_SUMMARY"
